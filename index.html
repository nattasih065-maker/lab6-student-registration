<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนนักศึกษา - Lab 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="sticky top-0 z-50 bg-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600">PSU Register</div>
            
            <div class="space-x-4">
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition duration-300">
                    ลงทะเบียน
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-12 flex justify-center items-center">
        <div id="form-container" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">แบบฟอร์มลงทะเบียนนักศึกษา</h2>
            
            <form id="registrationForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-1">ชื่อ-นามสกุล (Full Name)</label>
                    <input type="text" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="นาย ณัฐสิทธิ์ ทองจันทร์">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-1">รหัสนักศึกษา (Student ID)</label>
                        <input type="text" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="673XXXXXXX">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-1">คณะ/สาขา (Department)</label>
                        <input type="text" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="วิศวกรรมศาสตร์">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 mb-1">อีเมล (Email)</label>
                    <input type="email" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="nattasit065@email.com">
                </div>

                <div>
                    <label class="block text-gray-700 mb-1">เบอร์โทรศัพท์ (Phone Number)</label>
                    <input type="tel" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="08XXXXXXXX">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg mt-4 transition duration-300">
                    ยืนยันการลงทะเบียน
                </button>
            </form>
        </div>

        <div id="success-message" class="hidden bg-white p-12 rounded-2xl shadow-xl text-center">
            <div class="text-6xl mb-4 text-green-500">✅</div>
            <h2 class="text-3xl font-bold text-gray-800">ลงทะเบียนสำเร็จ</h2>
            <p class="text-gray-600 mt-2">ข้อมูลของคุณถูกบันทึกเรียบร้อยแล้ว</p>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            
            event.preventDefault();
            
            
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('success-message').classList.remove('hidden');
        });
    </script>
</body>
</html>
